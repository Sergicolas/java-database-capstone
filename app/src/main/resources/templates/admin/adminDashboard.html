<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

  <title>Admin Dashboard</title>

  <script th:src="@{/js/components/header.js}" defer></script>

</head>

      <div id="header"></div>
