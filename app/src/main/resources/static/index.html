<head>
    <meta charset="UTF-8">
    <title>Smart Clinic — Select Role</title>
  
    <link rel="icon" href="./assets/images/logo/Logo.png" type="image/png" />
    <link rel="stylesheet" href="./assets/css/index.css">
    <link rel="stylesheet" href="./assets/css/style.css">
  
    <!-- Expõe openModal globalmente ANTES do render.js -->
    <script type="module">
      import { openModal } from './js/components/modals.js';
      window.openModal = openModal;
    </script>
  
    <script src="./js/util.js" defer></script>
    <script src="./js/render.js" defer></script>
    <script src="./js/components/header.js" defer></script>
    <script src="./js/components/footer.js" defer></script>
  </head>
  
  <body>
    <div class="container">
      <div class="wrapper">
        <div id="header"></div>
  
        <main class="main-content">
          <h2>Select Your Role</h2>
          <div class="role-buttons">
            <button id="adminBtn" onclick="selectRole('admin')">Admin</button>
            <button id="doctorBtn" onclick="selectRole('doctor')">Doctor</button>
            <button id="patientBtn" onclick="selectRole('patient')">Patient</button>
          </div>
        </main>
  
        <div id="footer"></div>
      </div>
    </div>
  
    <div id="modal" class="modal" style="display: none;">
      <div class="modal-content">
        <button id="closeModal">&times;</button>
        <div id="modal-body"></div>
      </div>
    </div>
  
    <script type="module" src="./js/services/index.js"></script>
  </body>
