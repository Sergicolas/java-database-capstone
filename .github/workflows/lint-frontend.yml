name: Lint Frontend

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install linters
        run: npm install -g htmlhint stylelint stylelint-config-standard eslint

      - name: Lint HTML
        run: htmlhint "app/src/main/resources/static/**/*.html" || true

      - name: Lint CSS
        run: stylelint "app/src/main/resources/static/assets/css/**/*.css" || true

      - name: Lint JavaScript
        run: eslint "app/src/main/resources/static/js/**/*.js" || true